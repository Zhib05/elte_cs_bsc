<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <intput type="button" name="btn" value="Say hello world">
    </form>
    <output></output>
    <script>
        const output = document.querySelector("output")
        const button = document.querySelector("#btn")
        button.addEventListener("click", () => output.innerHTML = "Hello World")
    </script>
</body>
</html>
